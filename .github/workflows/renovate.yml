name: Renovate
on:
  schedule:
    # Run once a week at midnight on Sunday
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v46.1.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
